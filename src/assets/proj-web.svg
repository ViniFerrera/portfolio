  <rect x="80" y="170" width="280" height="10" rx="3" fill="rgba(255,255,255,0.08)"/>
  <rect x="80" y="186" width="300" height="10" rx="3" fill="rgba(255,255,255,0.06)"/>
  <!-- Cards -->
  <rect x="80" y="220" width="190" height="120" rx="6" fill="rgba(201,255,0,0.04)" stroke="rgba(201,255,0,0.2)" stroke-width="1"/>
  <rect x="285" y="220" width="190" height="120" rx="6" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <rect x="490" y="220" width="190" height="120" rx="6" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <rect x="95" y="235" width="80" height="8" rx="2" fill="rgba(201,255,0,0.5)"/>
