  <rect x="505" y="235" width="80" height="8" rx="2" fill="rgba(255,255,255,0.2)"/>
  <rect x="95" y="253" width="160" height="6" rx="2" fill="rgba(255,255,255,0.1)"/>
  <rect x="300" y="253" width="160" height="6" rx="2" fill="rgba(255,255,255,0.06)"/>
  <rect x="505" y="253" width="160" height="6" rx="2" fill="rgba(255,255,255,0.06)"/>
