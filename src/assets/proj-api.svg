<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#070f0a"/>
      <stop offset="100%" style="stop-color:#0a1e10"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>
  <!-- Endpoint cards -->
  <!-- GET -->
  <rect x="60" y="110" width="680" height="48" rx="6" fill="rgba(201,255,0,0.05)" stroke="rgba(201,255,0,0.2)" stroke-width="1"/>
  <rect x="76" y="123" width="52" height="22" rx="4" fill="rgba(201,255,0,0.2)"/>
  <text x="102" y="138" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#c9ff00">GET</text>
  <text x="145" y="138" font-family="monospace" font-size="12" fill="rgba(255,255,255,0.7)">/api/v1/projects</text>
  <rect x="640" y="123" width="84" height="22" rx="4" fill="rgba(201,255,0,0.1)"/>
  <text x="682" y="138" text-anchor="middle" font-family="monospace" font-size="10" fill="#c9ff00">200 OK</text>
  <!-- POST -->
  <rect x="60" y="172" width="680" height="48" rx="6" fill="rgba(100,180,255,0.04)" stroke="rgba(100,180,255,0.15)" stroke-width="1"/>
  <rect x="76" y="185" width="52" height="22" rx="4" fill="rgba(100,180,255,0.2)"/>
  <text x="102" y="200" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#64b4ff">POST</text>
  <text x="145" y="200" font-family="monospace" font-size="12" fill="rgba(255,255,255,0.7)">/api/v1/auth/login</text>
  <!-- PUT -->
  <rect x="60" y="234" width="680" height="48" rx="6" fill="rgba(255,180,80,0.04)" stroke="rgba(255,180,80,0.15)" stroke-width="1"/>
  <rect x="76" y="247" width="52" height="22" rx="4" fill="rgba(255,180,80,0.2)"/>
  <text x="102" y="262" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#ffb450">PUT</text>
  <text x="145" y="262" font-family="monospace" font-size="12" fill="rgba(255,255,255,0.7)">/api/v1/projects/:id</text>
  <!-- DELETE -->
  <rect x="60" y="296" width="680" height="48" rx="6" fill="rgba(255,80,80,0.04)" stroke="rgba(255,80,80,0.15)" stroke-width="1"/>
  <rect x="76" y="309" width="65" height="22" rx="4" fill="rgba(255,80,80,0.2)"/>
  <text x="108" y="324" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#ff5050">DELETE</text>
  <text x="158" y="324" font-family="monospace" font-size="12" fill="rgba(255,255,255,0.7)">/api/v1/projects/:id</text>
  <!-- Label -->
  <text x="40" y="55" font-family="'JetBrains Mono', monospace" font-size="13" fill="rgba(201,255,0,0.5)" letter-spacing="3">WEB DEVELOPMENT</text>
  <text x="40" y="78" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="rgba(255,255,255,0.9)">API REST Completa</text>
</svg>
