<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#060c14"/>
      <stop offset="100%" style="stop-color:#0c1824"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>
  <!-- Email icon -->
  <rect x="80" y="160" width="100" height="70" rx="8" fill="rgba(201,255,0,0.05)" stroke="rgba(201,255,0,0.3)" stroke-width="1.5"/>
  <path d="M88 170 L130 195 L172 170" stroke="#c9ff00" stroke-width="1.5" fill="none" opacity="0.5"/>
  <text x="130" y="252" text-anchor="middle" font-family="Arial" font-size="9" fill="rgba(255,255,255,0.4)">New Hire Email</text>
  <!-- Arrow -->
  <line x1="180" y1="195" x2="230" y2="195" stroke="rgba(201,255,0,0.4)" stroke-width="1.5"/>
  <polygon points="230,189 242,195 230,201" fill="rgba(201,255,0,0.4)"/>
  <!-- Step 1 -->
  <rect x="242" y="170" width="120" height="50" rx="6" fill="rgba(201,255,0,0.08)" stroke="rgba(201,255,0,0.3)" stroke-width="1"/>
  <text x="302" y="192" text-anchor="middle" font-family="Arial" font-size="10" fill="rgba(201,255,0,0.7)">Criar conta</text>
  <text x="302" y="207" text-anchor="middle" font-family="Arial" font-size="9" fill="rgba(255,255,255,0.3)">Azure AD</text>
  <!-- Arrow -->
  <line x1="362" y1="195" x2="412" y2="195" stroke="rgba(201,255,0,0.3)" stroke-width="1.5"/>
  <polygon points="412,189 424,201 412,201" fill="rgba(201,255,0,0.3)"/>
  <!-- Step 2 -->
  <rect x="424" y="170" width="120" height="50" rx="6" fill="rgba(201,255,0,0.06)" stroke="rgba(201,255,0,0.2)" stroke-width="1"/>
  <text x="484" y="192" text-anchor="middle" font-family="Arial" font-size="10" fill="rgba(201,255,0,0.6)">Enviar docs</text>
  <text x="484" y="207" text-anchor="middle" font-family="Arial" font-size="9" fill="rgba(255,255,255,0.3)">SharePoint + Email</text>
  <!-- Arrow -->
  <line x1="544" y1="195" x2="594" y2="195" stroke="rgba(201,255,0,0.2)" stroke-width="1.5"/>
  <polygon points="594,189 606,195 594,201" fill="rgba(201,255,0,0.2)"/>
  <!-- Step 3 -->
  <rect x="606" y="170" width="110" height="50" rx="6" fill="rgba(201,255,0,0.04)" stroke="rgba(201,255,0,0.15)" stroke-width="1"/>
  <text x="661" y="192" text-anchor="middle" font-family="Arial" font-size="10" fill="rgba(201,255,0,0.5)">Teams invite</text>
  <text x="661" y="207" text-anchor="middle" font-family="Arial" font-size="9" fill="rgba(255,255,255,0.3)">MS Teams</text>
  <!-- Stats -->
  <text x="80" y="330" font-family="monospace" font-size="12" fill="rgba(201,255,0,0.6)">Tempo economizado: <tspan fill="#c9ff00" font-weight="bold">4h / colaborador</tspan></text>
  <text x="80" y="354" font-family="monospace" font-size="12" fill="rgba(255,255,255,0.3)">Processos automatizados: 8</text>
  <text x="80" y="378" font-family="monospace" font-size="12" fill="rgba(255,255,255,0.3)">Integrações: Azure AD · SharePoint · Teams · Outlook</text>
  <!-- Label -->
  <text x="40" y="55" font-family="'JetBrains Mono', monospace" font-size="13" fill="rgba(201,255,0,0.5)" letter-spacing="3">POWER PLATFORM</text>
  <text x="40" y="78" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="rgba(255,255,255,0.9)">Automação de Onboarding</text>
</svg>
