<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#060d18"/>
      <stop offset="100%" style="stop-color:#0d1f30"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>
  <!-- Pipeline nodes -->
  <!-- Source -->
  <rect x="60" y="200" width="120" height="60" rx="8" fill="rgba(201,255,0,0.08)" stroke="rgba(201,255,0,0.4)" stroke-width="1.5"/>
  <text x="120" y="228" text-anchor="middle" font-family="monospace" font-size="11" fill="#c9ff00">SOURCE</text>
  <text x="120" y="246" text-anchor="middle" font-family="monospace" font-size="9" fill="rgba(255,255,255,0.4)">PostgreSQL</text>
  <!-- Arrow 1 -->
  <line x1="180" y1="230" x2="240" y2="230" stroke="rgba(201,255,0,0.5)" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="240,224 252,230 240,236" fill="rgba(201,255,0,0.5)"/>
  <!-- Transform -->
  <rect x="252" y="190" width="140" height="80" rx="8" fill="rgba(201,255,0,0.12)" stroke="#c9ff00" stroke-width="1.5"/>
  <text x="322" y="222" text-anchor="middle" font-family="monospace" font-size="11" fill="#c9ff00">TRANSFORM</text>
  <text x="322" y="240" text-anchor="middle" font-family="monospace" font-size="9" fill="rgba(255,255,255,0.4)">Python / ETL</text>
  <text x="322" y="256" text-anchor="middle" font-family="monospace" font-size="9" fill="rgba(255,255,255,0.3)">Linguagem M</text>
  <!-- Arrow 2 -->
  <line x1="392" y1="230" x2="452" y2="230" stroke="rgba(201,255,0,0.5)" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="452,224 464,230 452,236" fill="rgba(201,255,0,0.5)"/>
  <!-- Load -->
  <rect x="464" y="200" width="120" height="60" rx="8" fill="rgba(201,255,0,0.08)" stroke="rgba(201,255,0,0.4)" stroke-width="1.5"/>
  <text x="524" y="228" text-anchor="middle" font-family="monospace" font-size="11" fill="#c9ff00">LOAD</text>
  <text x="524" y="246" text-anchor="middle" font-family="monospace" font-size="9" fill="rgba(255,255,255,0.4)">Data Warehouse</text>
  <!-- Arrow to BI -->
  <line x1="584" y1="230" x2="650" y2="230" stroke="rgba(201,255,0,0.3)" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="650,224 662,230 650,236" fill="rgba(201,255,0,0.3)"/>
  <rect x="662" y="210" width="90" height="40" rx="8" fill="rgba(201,255,0,0.05)" stroke="rgba(201,255,0,0.2)" stroke-width="1"/>
  <text x="707" y="228" text-anchor="middle" font-family="monospace" font-size="9" fill="rgba(201,255,0,0.5)">POWER BI</text>
  <text x="707" y="243" text-anchor="middle" font-family="monospace" font-size="9" fill="rgba(255,255,255,0.3)">Reports</text>
  <!-- Code snippet -->
  <rect x="60" y="320" width="340" height="120" rx="6" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="80" y="344" font-family="monospace" font-size="11" fill="rgba(201,255,0,0.6)">df = pd.read_sql(query, conn)</text>
  <text x="80" y="364" font-family="monospace" font-size="11" fill="rgba(255,255,255,0.3)">df = df.dropna().reset_index()</text>
  <text x="80" y="384" font-family="monospace" font-size="11" fill="rgba(255,255,255,0.3)">df.to_sql('dw_sales', engine)</text>
  <!-- Label -->
  <text x="40" y="50" font-family="'JetBrains Mono', monospace" font-size="13" fill="rgba(201,255,0,0.5)" letter-spacing="3">DATA & ANALYTICS</text>
  <text x="40" y="75" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="rgba(255,255,255,0.9)">Pipeline ETL Automatizado</text>
</svg>
